name: PR

on:
  pull_request:
    branches: [main, main-standalone]
    paths:
      - 'platformio.ini'
      - 'lib/**'
      - 'include/**'
      - '.github/workflows/*.yml'
      - 'src/**/*.c'
      - 'src/**/*.cpp'
      - 'src/**/*.h'
      - 'src/**/*.ino'
      - '!**.md'
      - '!src/**/data_*/**'
      - '!src/*_backup/**'

jobs:
  # 1단계: 빌드할 환경 목록 추출
  get_environments:
    runs-on: ubuntu-latest
    outputs:
      environments: ${{ steps.read_output.outputs.envs }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: List PlatformIO environments
        id: list_envs
        run: |
          python -c "
          import configparser
          import json
          import os
          config = configparser.ConfigParser()
          config.read('platformio.ini')
          all_envs = [s.split(':', 1)[1] for s in config.sections() if s.startswith('env:')]
          envs = [e for e in all_envs if e in ['esp32-s3-n16r8']]
          if not envs and 'platformio' in config:
              default = config['platformio'].get('default_envs', '')
              if default: envs = [e.strip() for e in default.split(',')]
          if not envs: envs = all_envs
          print(json.dumps(envs))
          " > envs.json
        shell: bash

      - name: Read environments to output
        id: read_output
        run: |
          ENVS=$(<envs.json)
          if [ "$ENVS" == "[]" ] || [ -z "$ENVS" ]; then
            echo "Error: No environments found to build!"
            exit 1
          fi
          echo "envs=${ENVS}" >> $GITHUB_OUTPUT
        shell: bash

  # 2단계: 환경별 병렬 빌드 및 캐시 최적화
  build:
    runs-on: ubuntu-latest
    needs: get_environments
    strategy:
      fail-fast: false
      matrix:
        environments: ${{ fromJson(needs.get_environments.outputs.environments) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # [개선] 캐시 경로 및 키 최적화
      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio
            .pio/libdeps
            .pio/build
          # 키에 OS, 환경 이름, ini 파일 해시를 포함하여 정확도 향상
          key: ${{ runner.os }}-pio-v1-${{ matrix.environments }}-${{ hashFiles('**/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-v1-${{ matrix.environments }}-
            ${{ runner.os }}-pio-v1-

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio

      # [개선] 의존성 설치와 정리를 빌드 전 단계로 명확히 분리
      - name: PlatformIO Lib Install & Deep Cleanup
        run: |
          # 라이브러리 먼저 설치
          pio lib install -e ${{ matrix.environments }}
          
          # esp-dsp 등 특정 라이브러리 충돌 방지 cleanup
          DSP_DIR=".pio/libdeps/${{ matrix.environments }}/esp-dsp"
          if [ -d "$DSP_DIR" ]; then
            echo "Cleaning up esp-dsp for S3..."
            find "$DSP_DIR" -type d -name "test*" -exec rm -rf {} +
            rm -rf "$DSP_DIR/examples" "$DSP_DIR/applications"
            find "$DSP_DIR" -name "*_arp4.S" -delete
          fi
        shell: bash

      - name: Run PlatformIO build
        run: pio run -e ${{ matrix.environments }}

      - name: Build filesystem image
        run: pio run -e ${{ matrix.environments }} --target buildfs
        continue-on-error: true

      - name: Upload Unified Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.environments }}-build-bundle
          path: |
            .pio/build/${{ matrix.environments }}/firmware.bin
            .pio/build/${{ matrix.environments }}/partitions.bin
            .pio/build/${{ matrix.environments }}/bootloader.bin
            .pio/build/${{ matrix.environments }}/littlefs.bin
          if-no-files-found: warn
