name: PR

on:
  pull_request:
    branches: [main, main-standalone]
    paths:
      - 'platformio.ini'
      - 'lib/**'
      - 'include/**'
      - '.github/workflows/*.yml'
      - 'src/**/*.c'
      - 'src/**/*.cpp'
      - 'src/**/*.h'
      - 'src/**/*.ino'
      - '!**.md'
      - '!src/**/data_*/**'
      - '!src/*_backup/**'

jobs:
  get_environments:
    runs-on: ubuntu-latest
    outputs:
      environments: ${{ steps.read_output.outputs.envs }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: List PlatformIO environments
        id: list_envs
        run: |
          python -c "
          import configparser
          import json
          import os
          config = configparser.ConfigParser()
          config.read('platformio.ini')
          all_envs = [s.split(':', 1)[1] for s in config.sections() if s.startswith('env:')]
          
          envs = [e for e in all_envs if e in ['esp32-s3-n16r8', 'esp32-s3-zero']]
          # envs = [e for e in all_envs if e in ['esp32-s3-n16r8']]
          if not envs and 'platformio' in config:
              default = config['platformio'].get('default_envs', '')
              if default: envs = [e.strip() for e in default.split(',')]
          if not envs: envs = all_envs
          print(json.dumps(envs))
          " > envs.json
        shell: bash

      - name: Read environments to output
        id: read_output
        run: |
          ENVS=$(<envs.json)
          if [ "$ENVS" == "[]" ] || [ -z "$ENVS" ]; then
            echo "Error: No environments found to build!"
            exit 1
          fi
          echo "envs=${ENVS}" >> $GITHUB_OUTPUT
        shell: bash

  build:
    runs-on: ubuntu-latest
    needs: get_environments
    strategy:
      fail-fast: false
      matrix:
        environments: ${{ fromJson(needs.get_environments.outputs.environments) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # [핵심] 캐시 설정 보완
      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio
            .pio/libdeps
            .pio/build
          # 캐시 키에 platformio.ini의 해시를 포함하여 의존성 변경 시 갱신 유도
          key: ${{ runner.os }}-pio-v2-${{ matrix.environments }}-${{ hashFiles('**/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-v2-${{ matrix.environments }}-
            ${{ runner.os }}-pio-v2-

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio

      # [수정] lib install 대신 pkg install 사용 또는 --dry-run 활용
      - name: PlatformIO Dependency Setup & Cleanup
        run: |
          # 1. 라이브러리 및 툴체인 설치 (에러 방지를 위해 pkg install 사용)
          pio pkg install -e ${{ matrix.environments }}
          
          # 2. esp-dsp 충돌 방지 클린업
          # matrix.environments 변수를 사용하여 경로 유연성 확보
          DSP_DIR=".pio/libdeps/${{ matrix.environments }}/esp-dsp"
          if [ -d "$DSP_DIR" ]; then
            echo "Cleaning up esp-dsp for ${{ matrix.environments }}..."
            find "$DSP_DIR" -type d -name "test*" -exec rm -rf {} +
            rm -rf "$DSP_DIR/examples" "$DSP_DIR/applications"
            find "$DSP_DIR" -name "*_arp4.S" -delete
            echo "Deep cleanup complete."
          else
            echo "esp-dsp not found, skipping cleanup."
          fi
        shell: bash

      - name: Run PlatformIO build
        run: pio run -e ${{ matrix.environments }}

      - name: Build filesystem image
        run: pio run -e ${{ matrix.environments }} --target buildfs
        continue-on-error: true

      - name: Upload Unified Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.environments }}-build-bundle
          path: |
            .pio/build/${{ matrix.environments }}/firmware.bin
            .pio/build/${{ matrix.environments }}/partitions.bin
            .pio/build/${{ matrix.environments }}/bootloader.bin
            .pio/build/${{ matrix.environments }}/littlefs.bin
          if-no-files-found: warn
