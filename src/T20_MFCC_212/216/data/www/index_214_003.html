<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T20 MFCC v214 Control</title>
    <link rel="stylesheet" href="style_214_003.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <div class="logo">T20 MFCC <span>v214</span></div>
        <div id="status-tag" class="tag offline">OFFLINE</div>
    </header>

    <nav class="tab-bar">
        <button class="tab-btn active" onclick="showTab('tab-dash')">Dashboard</button>
        <button class="tab-btn" onclick="showTab('tab-settings')">Settings</button>
        <button class="tab-btn" onclick="showTab('tab-files')">Explorer</button>
        <button class="tab-btn" onclick="showTab('tab-diag')">Diagnostics</button>
    </nav>

    <main class="container">
        <section id="tab-dash" class="tab-content active">
            <div class="toolbar">
                <button id="btn-start" class="btn primary">START</button>
                <button id="btn-stop" class="btn danger">STOP</button>
                <button id="btn-learn" class="btn warning">NOISE LEARN</button>
                <div class="mini-stat">
                    FPS: <span id="val-fps">0.0</span> | 
                    Dropped: <span id="val-dropped">0</span> | 
                    Samples: <span id="val-samples">0</span>
                </div>
            </div>
            <div class="grid">
                <div class="chart-container"><canvas id="chart-waveform"></canvas></div>
                <div class="chart-container"><canvas id="chart-spectrum"></canvas></div>
                <div class="chart-container"><canvas id="chart-mfcc"></canvas></div>
            </div>

            <h4 style="margin: 15px 0 5px 0; color: #888;">Spectrogram (Waterfall)</h4>
            <div class="grid">
                <div class="chart-container" style="height: 150px;">
                    <canvas id="chart-waterfall-spec"></canvas>
                </div>
                <div class="chart-container" style="height: 150px;">
                    <canvas id="chart-waterfall-mfcc"></canvas>
                </div>
            </div>
        </section>

        <section id="tab-settings" class="tab-content">
            <div class="card">
                <h3>DSP & Feature Configuration</h3>
                <form id="form-config">
                    <div class="form-group">
                        <label>Hop Size (Samples)</label>
                        <input type="number" name="hop_size" min="64" max="512">
                    </div>
                    <div class="form-group">
                        <label>MFCC Coefficients</label>
                        <input type="number" name="mfcc_coeffs" min="1" max="13">
                    </div>
                    <div class="form-group">
                        <label>Pre-emphasis Alpha</label>
                        <input type="number" step="0.01" name="pre_alpha" min="0" max="1">
                    </div>
                    <div class="form-group">
                        <label>Filter Cutoff (Hz)</label>
                        <input type="number" name="filter_cutoff" min="0" max="800">
                    </div>
                    <div class="form-group">
                        <label>Noise Mode (0:OFF, 1:FIXED, 2:ADAPTIVE)</label>
                        <select name="noise_mode">
                            <option value="0">OFF</option>
                            <option value="1">FIXED</option>
                            <option value="2">ADAPTIVE</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Subtract Strength</label>
                        <input type="number" step="0.1" name="sub_strength" min="0" max="5">
                    </div>
                    <button type="button" onclick="saveSettings()" class="btn primary">APPLY SETTINGS</button>
                </form>
            </div>
        </section>

        <section id="tab-files" class="tab-content">
            <div class="card">
                <div class="toolbar">
                    <h3>SD_MMC Storage</h3>
                    <button onclick="refreshFileList()" class="btn">Refresh List</button>
                </div>
                <table>
                    <thead><tr><th>File Name</th><th>Size (Bytes)</th><th>Records</th><th>Action</th></tr></thead>
                    <tbody id="file-list"></tbody>
                </table>
            </div>
        </section>

        <section id="tab-diag" class="tab-content">
            <div class="grid">
                <div class="card">
                    <h3>System Health</h3>
                    <pre id="diag-health" class="log-box">Waiting for data...</pre>
                </div>
                <div class="card">
                    <h3>Sensor Bridge State</h3>
                    <pre id="diag-sensor" class="log-box">Waiting for data...</pre>
                </div>
            </div>
        </section>
    </main>

    <div id="toast" class="toast"></div>

    <script src="app_214_003.js"></script>
</body>
</html>
