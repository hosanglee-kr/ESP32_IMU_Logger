<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>T20 Adaptive Learning Center</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: #334155; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .card { background: var(--card); border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); margin-bottom: 20px; }
        .btn { padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #1d4ed8; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .status-complete { background: #dcfce7; color: #166534; }
        .status-waiting { background: #fef9c3; color: #854d0e; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #e2e8f0; }
        .progress-bar { width: 100%; height: 8px; background: #e2e8f0; border-radius: 4px; overflow: hidden; margin-top: 10px; }
        .progress-fill { width: 45%; height: 100%; background: var(--primary); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>T20 설비 지능 학습 센터</h1>
            <button class="btn btn-primary" onclick="startLearning()">Auto-Learning 시작</button>
        </div>

        <div class="card">
            <h3>현재 학습 진행률 (Auto-Session)</h3>
            <div class="progress-bar"><div class="progress-fill" id="pb"></div></div>
            <p id="status-text" style="font-size: 14px; color: #64748b; margin-top: 8px;">설비의 사이클을 분석 중입니다... (정속 구간 2개 발견됨)</p>
        </div>

        <div class="card">
            <h3>설비 상태 프로파일 목록</h3>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>상태명</th>
                        <th>학습 상태</th>
                        <th>평균 RMS (μ)</th>
                        <th>표준편차 (σ)</th>
                        <th>관리</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>3110</td>
                        <td>RUN_STEADY_LOW</td>
                        <td><span class="status-badge status-complete">학습 완료</span></td>
                        <td>0.125 G</td>
                        <td>0.008</td>
                        <td><button class="btn" style="font-size: 12px;">재학습</button></td>
                    </tr>
                    <tr>
                        <td>3120</td>
                        <td>RUN_STEADY_MID</td>
                        <td><span class="status-badge status-waiting">데이터 수집 중</span></td>
                        <td>0.452 G</td>
                        <td>0.015</td>
                        <td><button class="btn" style="font-size: 12px;">확정</button></td>
                    </tr>
                    <tr>
                        <td>3210</td>
                        <td>RUN_TRANS_ACC</td>
                        <td><span class="status-badge status-waiting">대기</span></td>
                        <td>-</td>
                        <td>-</td>
                        <td>-</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="card">
            <h3>학습 민감도 설정 (K-Factor)</h3>
            <div style="display: flex; gap: 20px; align-items: center;">
                <label>정상 범위 배수 (k): </label>
                <input type="range" min="3" max="10" value="6" style="flex: 1;">
                <span>현재: 6σ (매우 엄격)</span>
            </div>
        </div>
    </div>

    <script>
        function startLearning() {
            alert("자동 학습 세션을 시작합니다. 설비를 평소처럼 가동해 주세요.");
            document.getElementById('status-text').innerText = "데이터 분석 엔진 가동 중... 가속 패턴 감지됨.";
            document.getElementById('pb').style.width = "70%";
        }
    </script>
</body>
</html>
