; PlatformIO Project Configuration File
; ESP32-S3 프로젝트 통합 설정 (N16R8, Zero/Super Mini 대응)

[platformio]
; 기본 빌드 대상 설정 (필요에 따라 변경)
default_envs = esp32-s3-n16r8
; 전역 data_dir은 주석 처리하고 env별로 관리하는 것을 권장합니다.
; data_dir = ./src/T4_MC_001/003/data

[common]
	platform = espressif32
	framework = arduino
	monitor_speed = 115200
	board_build.filesystem = littlefs
	; 파티션 설정 (16MB 플래시인 경우에 맞춰 조정 필요할 수 있음)
	; board_build.partitions = min_spiffs.csv
	
	; 라이브러리 의존성 공통 관리
	lib_deps =
	    FS
	    SD_MMC
	    SPI
	    bblanchon/ArduinoJson @ ^7.4.3
	    esp32async/ESPAsyncWebServer @ ^3.10.1
	    sparkfun/SparkFun BMI270 Arduino Library @ ^1.0.3
	    martinbudden/VectorQuaternionMatrix @ ^0.4.10
	    martinbudden/SensorFusion @ ^0.2.14
	    knolleary/PubSubClient @ ^2.8
	    https://github.com/espressif/esp-dsp.git#v1.7.1
	
	lib_ldf_mode = deep+
	lib_archive = no
	
	; 공통 빌드 플래그 (C++17 강제 및 esp-dsp 설정)
	build_unflags =
	    -std=gnu++11
	    -std=c++11
	
	build_flags =
	    -std=gnu++17
	    -D CONFIG_DSP_OPTIMIZED=1
	    -D CONFIG_DSP_OPTIMIZATION_AES3=y
	    -D CONFIG_IDF_TARGET_ESP32S3=1
	    -D SOC_SDMMC_HOST_SUPPORTED
	    ; esp-dsp 헤더 경로
	    -I .pio/libdeps/$PIOENV/esp-dsp/modules/common/include
	    -I .pio/libdeps/$PIOENV/esp-dsp/modules/fft/include
	    -I .pio/libdeps/$PIOENV/esp-dsp/modules/filter/include
	    -I .pio/libdeps/$PIOENV/esp-dsp/modules/dotprod/include
	    -I .pio/libdeps/$PIOENV/esp-dsp/modules/dotprod/float
	    -I .pio/libdeps/$PIOENV/esp-dsp/modules/dotprod/fixed
	    -I .pio/libdeps/$PIOENV/esp-dsp/modules/math/include
	    -I .pio/libdeps/$PIOENV/esp-dsp/modules/matrix/include
	    -I .pio/libdeps/$PIOENV/esp-dsp/modules/iir/include
	    -I .pio/libdeps/$PIOENV/esp-dsp/modules/fir/include
	    -I .pio/libdeps/$PIOENV/esp-dsp/modules/conv/include
	    -I .pio/libdeps/$PIOENV/esp-dsp/modules/conv/float
	    -I .pio/libdeps/$PIOENV/esp-dsp/modules/support/include

	; 필터 설정
	build_src_filter =
	    -<*>
	    +<main.cpp>
	    +<T20_MFCC_230/231/>
	    +<T4_MC_001/004/>
	
	; 스크립트 공통 적용
	extra_scripts =
	    pre:shared/get_version.py
	    pre:shared/setup_esp_dsp.py

# ---------------------------------------------------
# 1. 기존 Dev Kit (S3 기본형)
# ---------------------------------------------------
; [env:esp32-s3-devkitm-1]
;	extends = common
;	board = esp32-s3-devkitm-1
;	data_dir = ./src/T4_MC_001/003/data

# ---------------------------------------------------
# 2. ESP32-S3 N16R8 (16MB Flash / 8MB PSRAM)
# ---------------------------------------------------
[env:esp32-s3-n16r8]
	extends = common
	board = esp32-s3-devkitm-1 ; 기본 S3 보드 정의 사용
	board_build.data_dir = ./src/T4_MC_001/004/data
	board_build.partitions = default_16MB.csv

	
	; 보드 상세 사양 강제 지정 (16MB Flash / OPI PSRAM)
	board_build.arduino.memory_type = opi_opi
	board_build.f_flash = 80000000L
	board_build.f_cpu = 240000000L
	board_upload.flash_size = 16MB
	
	build_flags =
	    ${common.build_flags}
	    -D BOARD_HAS_PSRAM
	    ; 16MB 플래시에 적합한 파티션 테이블 사용 권장 (default_16MB.csv 등)
	    ; -D ARDUINO_USB_MODE=1
	    ; -D ARDUINO_USB_CDC_ON_BOOT=1

# ---------------------------------------------------
# 3. ESP32-S3 Zero (Super Mini, 2MB PSRAM)
# ---------------------------------------------------
[env:esp32-s3-zero]
	extends = common
	board = esp32-s3-devkitm-1
	board_build.partitions = default.csv  ; min_spiffs.csv
	board_build.data_dir = ./src/T20_MFCC_230/231/data

	; Super Mini 특성상 칩 내부/외부 PSRAM 타입에 맞춰 설정 (보통 qio_qio 또는 qio_opi)
	board_build.arduino.memory_type = qio_qio
	board_upload.flash_size = 4MB ; Zero 보드는 대개 4MB Flash임
	
	build_flags =
	    ${common.build_flags}
	    -D BOARD_HAS_PSRAM
	    ; Super Mini는 USB CDC 설정을 켜야 시리얼 모니터가 잡히는 경우가 많음
	    -D ARDUINO_USB_MODE=1
	    -D ARDUINO_USB_CDC_ON_BOOT=1